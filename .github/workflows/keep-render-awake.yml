name: Garder le back Render eveille

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping du back
        run: |
          curl -sf \
            --retry 5 \
            --retry-delay 30 \
            --retry-all-errors \
            --max-time 300 \
            -o /dev/null \
            "https://burger-house-api-xw1a.onrender.com/api/produits"
